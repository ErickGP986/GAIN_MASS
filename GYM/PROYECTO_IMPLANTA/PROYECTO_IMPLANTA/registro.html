<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - GAIN MASS</title>
    <link rel="icon" href="img/LG.png" type="image/png">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="registro-body">

<div class="registro-container">

    <h1>Crear Cuenta</h1>

    <!-- Barra de progreso -->
    <div class="progreso">
        <div class="barra" id="barraProgreso"></div>
    </div>

    <form id="formRegistro">

        <!-- PASO 1 -->
        <div class="paso activo">
            <input type="text" id="nombreUsuario" placeholder="Nombre de usuario" required>
            <input type="email" id="correoUsuario" placeholder="Correo electrónico" required>
            <input type="password" id="contrasenaUsuario" placeholder="Contraseña" required minlength="6">

            <button type="button" onclick="siguientePaso()">Siguiente</button>
        </div>

        <!-- PASO 2 -->
<!-- PASO 2 -->
<div class="paso">

    <div class="campo-linea">
        <label>Edad</label>
        <input type="number" min="10" max="100" value="22" required>
        <span>años</span>
    </div>

    <div class="campo-linea">
        <label>Sexo</label>
        <select required>
            <option value="">Seleccionar</option>
            <option>F</option>
            <option>M</option>
        </select>
        <span>▼</span>
    </div>

    <div class="campo-linea">
    <label>Altura</label>
    <select required>
        <option value="">Seleccionar</option>
        <option>140 cm</option>
        <option>145 cm</option>
        <option>150 cm</option>
        <option>155 cm</option>
        <option>160 cm</option>
        <option>165 cm</option>
        <option>170 cm</option>
        <option>175 cm</option>
        <option>180 cm</option>
        <option>185 cm</option>
        <option>190 cm</option>
        <option>195 cm</option>
        <option>200 cm</option>
    </select>
</div>

    <div class="campo-linea">
    <label>Peso</label>
    <input type="number" step="0.1" placeholder="50.0" required>
    <span>kg</span>
</div>

    <button type="button" onclick="anteriorPaso()">Atrás</button>
    <button type="button" onclick="siguientePaso()">Siguiente</button>

</div>

        <!-- PASO 3 -->
        <!-- PASO 3 -->
<div class="paso">

    <div class="campo-select">
        <select required>
            <option value="">Nivel</option>
            <option>Principiante</option>
            <option>Intermedio</option>
            <option>Avanzado</option>
        </select>
    </div>

    <div class="campo-select">
        <select required>
            <option value="">Días por semana</option>
            <option>2 días</option>
            <option>3 días</option>
            <option>4 días</option>
            <option>5 días</option>
            <option>6 días</option>
        </select>
    </div>

    <input type="text" placeholder="Ejercicios que no puedes hacer (opcional)">

    <div class="botones">
    <button type="button" class="btn-secundario" onclick="anteriorPaso()">Atrás</button>
    <button type="submit">Guardar Perfil</button>
</div>
</div>

    </form>
    <div id="resultadoRegistro" class="resultado-registro oculto" aria-live="polite"></div>
    <div class="botones">
        <a href="index.html" class="registro-btn">Ir a acceso unificado</a>
    </div>
</div>

<!-- El JS siempre va justo antes de cerrar body -->
<script src="registro.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión - GAIN MASS</title>
    <link rel="icon" href="img/LG.png" type="image/png">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="registro-body">
    <div class="registro-container">
        <h1>Iniciar Sesión</h1>

        <form id="formLogin">
            <input type="email" id="loginCorreo" placeholder="Correo electrónico" required>
            <input type="password" id="loginContrasena" placeholder="Contraseña" required>
            <button type="submit">Entrar</button>
        </form>

        <div class="botones">
            <a href="index.html" class="registro-btn">Registro/Login unificado</a>
            <a href="index.html" class="registro-btn">Volver al inicio</a>
        </div>

        <div id="resultadoLogin" class="resultado-registro oculto" aria-live="polite"></div>
    </div>

    <script src="login.js"></script>
</body>
</html>

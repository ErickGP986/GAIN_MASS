<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajustes - GAIN MASS</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">
</head>
<body class="body-ajustes">
    <main class="container-ajustes">
        <h1 class="titulo-seccion">Configuración</h1>
    
        <section class="card-ajustes">
            <h2><span class="icon">👤</span> Cuenta</h2>
            <div class="input-group">
                <label>Correo Electrónico</label>
                <input type="email" value="josemendoz@gmail.com" disabled class="input-disabled">
            </div>
            <button class="btn-secundario">Cambiar Contraseña</button>
        </section>
    
        <section class="card-ajustes">
            <h2><span class="icon">⚙️</span> Preferencias</h2>
            <div class="control-row">
                <span>Unidades de peso</span>
                <select class="select-ajustes">
                    <option>Kilogramos (kg)</option>
                    <option>Libras (lb)</option>
                </select>
            </div>
            <div class="control-row">
                <span>Notificaciones de voz (IA)</span>
                <input type="checkbox" checked class="checkbox-ajustes">
            </div>
        </section>
    
        <section class="card-ajustes zona-peligro">
            <h2>Zona de Peligro</h2>
            <p>Una vez eliminada la cuenta, no hay vuelta atrás.</p>
            <button class="btn-eliminar">Eliminar mi cuenta por completo</button>
        </section>
    </main>
</body>
</html>

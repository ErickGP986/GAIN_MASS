<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAIN MASS - Compartir por QR</title>
    <link rel="icon" href="img/LG.png" type="image/png">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&display=swap" rel="stylesheet">
</head>
<body class="registro-body">
    <div class="registro-container auth-container" style="max-width:620px;">
        <h1 style="margin-top:0;">Abrir en tu telefono</h1>
        <p style="text-align:center; color:#aaa; font-size:0.9rem; margin-bottom:1.25rem;">
            Genera un QR para abrir la app desde tu celular.
        </p>

        <section data-qr-share style="padding:16px;border:1px solid #2b2b2b;border-radius:12px;background:#151515;">
            <h3 style="margin:0 0 8px;font-size:1rem;">Compartir app con QR</h3>
            <p style="margin:0 0 12px;color:#b3b3b3;font-size:.85rem;" data-qr-tip></p>
            <input type="text" data-qr-url-input placeholder="URL para celular (ej: http://192.168.1.20:5500/)" style="width:100%;padding:10px;border-radius:8px;border:1px solid #333;background:#0f0f0f;color:#fff;">
            <button type="button" data-qr-generate style="margin-top:8px;padding:9px 12px;border:none;border-radius:8px;background:#ff7a00;color:#fff;cursor:pointer;">Generar QR</button>
            <div style="margin-top:12px;text-align:center;">
                <img data-qr-image src="" alt="QR" style="width:220px;height:220px;background:#fff;padding:6px;border-radius:8px;">
                <p style="margin-top:8px;font-size:.8rem;word-break:break-all;"><a data-qr-link href="#" style="color:#8ecbff;"></a></p>
            </div>
        </section>

        <p style="margin-top:12px; text-align:center;">
            <a href="index.html" style="color:#8ecbff;">Volver a inicio de sesion</a>
        </p>
    </div>

    <script src="qr-share.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMC — GAIN MASS</title>
    <link rel="icon" href="img/LG.png" type="image/png">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="registro-body" data-auth-required="true">
    <div class="registro-container auth-container" style="max-width: 520px;">
        <a href="home.html" class="auth-link-btn" style="display:inline-block; margin-bottom:12px;">← Volver al inicio</a>
        <h1>Calculadora IMC</h1>
        <p style="color:#aaa; font-size:0.9rem; margin-bottom:1rem;">Los datos se guardan en la base de datos vinculados a tu cuenta. Puedes escribir la altura en <strong>metros</strong> (1,70) o en <strong>centímetros</strong> (170).</p>

        <div id="bloqueUltimo" class="oculto" style="background:rgba(0,255,156,0.08); border:1px solid rgba(0,255,156,0.25); border-radius:12px; padding:16px; margin-bottom:20px;">
            <p style="margin:0 0 8px;"><strong>Último registro guardado</strong></p>
            <p id="textoUltimo" style="margin:0; font-size:0.9rem; color:#ccc;"></p>
            <a href="home.html" class="btn-registro-llamativo" style="display:inline-block; margin-top:12px; text-align:center;">Ir al panel principal</a>
        </div>

        <form id="formImc" class="auth-form" style="margin-top:0;">
            <input type="text" id="imcNombre" placeholder="Nombre" required maxlength="120">
            <input type="number" id="imcEdad" placeholder="Edad" required min="10" max="120">
            <select id="imcSexo" required>
                <option value="">Sexo</option>
                <option value="masculino">Masculino</option>
                <option value="femenino">Femenino</option>
                <option value="otro">Otro / prefiero no decir</option>
            </select>
            <input type="number" id="imcPeso" placeholder="Peso (kg)" required min="20" max="400" step="0.1">
            <input type="number" id="imcAltura" placeholder="Altura: 1.70 (m) o 170 (cm)" required min="0.5" max="250" step="any">
            <button type="submit">Calcular y guardar</button>
        </form>

        <div id="resultadoImc" class="resultado-registro oculto" aria-live="polite"></div>
    </div>

    <script src="auth.js"></script>
    <script src="imc.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Usuarios</title>
    <link rel="icon" href="img/LG.png" type="image/png">
    <link rel="stylesheet" href="styles.css">
</head>
<body data-auth-required="true">
    <header class="header">
        <div class="logo">GYM</div>
        <div class="nav-derecha">
            <nav>
                <a href="home.html">Inicio</a>
                <a href="ejercicios.html">Ejercicios</a>
                <a href="ajustes.html">Ajustes</a>
                <a href="#" onclick="cerrarSesion()">Cerrar sesión</a>
            </nav>
        </div>
    </header>

    <section class="dashboard">
        <h2>Usuarios registrados</h2>
        <p>Total: <strong id="totalUsuarios">0</strong></p>

        <div style="margin-top: 20px; overflow-x: auto;">
            <table id="tablaUsuarios" style="width: 100%; border-collapse: collapse; min-width: 720px;">
                <thead>
                    <tr>
                        <th style="text-align:left; padding:10px; border-bottom:1px solid #333;">ID</th>
                        <th style="text-align:left; padding:10px; border-bottom:1px solid #333;">Nombre</th>
                        <th style="text-align:left; padding:10px; border-bottom:1px solid #333;">Correo</th>
                        <th style="text-align:left; padding:10px; border-bottom:1px solid #333;">Teléfono</th>
                        <th style="text-align:left; padding:10px; border-bottom:1px solid #333;">Correo respaldo</th>
                        <th style="text-align:left; padding:10px; border-bottom:1px solid #333;">Premium</th>
                        <th style="text-align:left; padding:10px; border-bottom:1px solid #333;">Creado</th>
                    </tr>
                </thead>
                <tbody id="cuerpoTabla"></tbody>
            </table>
        </div>
    </section>

    <script src="auth.js"></script>
    <script src="admin.js"></script>
    <script src="script.js"></script>
</body>
</html>
